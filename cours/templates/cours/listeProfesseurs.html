{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Liste des Professeurs</h2>
</div>

<table class="table table-bordered table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Nom</th>
      <th>Prénom</th>
      <th>Spécialité</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    {% for p in professeurs %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.nom }}</td>
      <td>{{ p.prenom }}</td>
      <td>{{ p.specialite }}</td>
      <td>{{ p.email }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="6" class="text-center">Aucun professeur enregistré.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
