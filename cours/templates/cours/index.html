{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Liste des Cours</h2>
  <a href="/cours/ajoutCours/" class="btn btn-success">+ Ajouter un cours</a>
</div>

<form method="GET" class="mb-3">
  <div class="row g-2">
    <div class="col-md-4">
      <input type="text" name="q" class="form-control" placeholder="Rechercher par titre..." value="{{ q }}">
    </div>
    <div class="col-md-3">
      <select name="professeur" class="form-select">
        <option value="">-- Tous les professeurs --</option>
        {% for p in professeurs %}
          <option value="{{ p.id }}" {% if professeur_id == p.id|stringformat:"s" %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <select name="classe" class="form-select">
        <option value="">-- Toutes les classes --</option>
        {% for cl in classes %}
          <option value="{{ cl.id }}" {% if classe_id == cl.id|stringformat:"s" %}selected{% endif %}>{{ cl }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <input type="date" name="date" class="form-control" value="{{ date }}">
    </div>
    <div class="col-md-1 d-flex gap-1">
      <button class="btn btn-primary" type="submit">OK</button>
      <a href="/cours/" class="btn btn-outline-secondary">✕</a>
    </div>
  </div>
</form>

<table class="table table-bordered table-hover">
  <thead>
    <tr>
      <th>Titre</th>
      <th>Professeur</th>
      <th>Classe</th>
      <th>Date de début</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in cours %}
    <tr>
      <td>{{ c.titre }}</td>
      <td>{{ c.professeur }}</td>
      <td>{{ c.classe }}</td>
      <td>{{ c.date_debut }}</td>
      <td>
        <a href="/cours/editCours/{{ c.id }}/" class="btn btn-sm btn-warning">Modifier</a>
        <a href="/cours/deleteCours/{{ c.id }}/" class="btn btn-sm btn-danger"
           onclick="return confirm('Voulez-vous vraiment supprimer ce cours ?')">Supprimer</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="5" class="text-center text-muted">Aucun cours trouvé.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
